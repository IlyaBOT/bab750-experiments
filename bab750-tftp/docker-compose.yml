services:
  tftp:
    image: alpine:3.20
    container_name: bab750-tftp
    restart: unless-stopped
    command: >
      sh -c "apk add --no-cache tftp-hpa >/dev/null &&
      in.tftpd --listen --foreground --verbose --secure /tftpboot"
    ports:
      - "69:69/udp"
    volumes:
      - ./tftpboot:/tftpboot:ro

  nfs:
    image: itsthenetwork/nfs-server-alpine:latest
    container_name: bab750-nfs
    restart: unless-stopped
    privileged: true
    environment:
      SHARED_DIRECTORY: /exports
      SHARED_DIRECTORY_2: /exports/adelie-full
      PERMITTED: "*"
      SYNC: "1"
    ports:
      - "111:111/tcp"
      - "111:111/udp"
      - "2049:2049/tcp"
    volumes:
      - ./nfsroot:/exports
