listen=YES
listen_ipv6=NO
background=NO

anonymous_enable=YES
local_enable=NO
write_enable=NO
anon_root=/srv/ftp
no_anon_password=YES
hide_ids=YES

# For ancient boot ROMs, active FTP is usually simpler.
port_enable=YES
connect_from_port_20=YES
pasv_enable=NO

# Logging
xferlog_enable=YES
xferlog_std_format=NO
log_ftp_protocol=YES
vsftpd_log_file=/var/log/vsftpd.log

# Misc
use_localtime=YES
check_shell=NO
seccomp_sandbox=NO
secure_chroot_dir=/var/run/vsftpd/empty
